# 基础信息配置
minimal_mistakes_skin: "default"
locale: "zh-CN"
title: "郎梓璇的作品集"
title_separator: "-"
name: "郎梓璇"
description: "新媒体技术专业 | 个人作品展示"
url: "https://ohhacat.github.io"
baseurl: ""
repository: "ohhacat/ohhacat.github.io"

# 侧边栏作者信息
author:
  name: "郎梓璇"
  avatar: "/assets/images/me.jpg"
  bio: "正在寻找新媒体技术岗位的毕业生"
  location: "杭州"
  email: "lang0388@163.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-square-envelope"
      url: "mailto:lang0388@163.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ohhacat"
    - label: "简历下载"
      icon: "fas fa-fw fa-file-pdf"
      url: "/assets/resume.pdf"

# 插件声明
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# 默认布局设置
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

# 系统必要配置
markdown: kramdown
highlighter: rouge
paginate: 5
paginate_path: /page:num/
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - vendor
  - node_modules
  - package.json
  - Gemfile
  - README
